<!doctype html>
<html
  lang="en"
  data-color-version="v2"
  data-theme="jarvis"
  data-mode="dark"
  class="h-screen antialiased scroll-smooth"
  style="--toast-top-offset: 56px"
  data-chat-text-size="m"
  data-transcript-width="m"
>
  <head>
    <meta charset="utf-8" />
    <meta property="og:title" content="Jarvis" />
    <meta name="twitter:title" content="Jarvis" />
    <meta
      property="og:description"
      content="Jarvis – personal voice assistant"
    />
    <meta
      name="twitter:description"
      content="Jarvis – personal voice assistant"
    />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,viewport-fit=cover"
    />
    <title>Jarvis</title>
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jarvis" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="stylesheet" href="assets/css/theme.css" />
    <link rel="stylesheet" href="assets/css/app.css" />
    <link rel="stylesheet" href="assets/css/theme-ios.css" />
    <link rel="stylesheet" href="assets/css/artifact.css" />
    <link rel="stylesheet" href="assets/css/chat.css" />

    
    
    
    
    
    
    
    
    <meta
      name="description"
      content="Jarvis – personal voice assistant"
    />
    <meta name="theme-color" content="hsl(60,2%,6%)" />
    
    
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
    <link rel="shortcut icon" href="assets/favicon.ico" />
    <link rel="apple-touch-icon" href="assets/favicon.svg" />
    
    <!-- CSP entfernt fuer lokale Bearbeitung -->
  </head>
  <body
    class="bg-bg-100 text-text-100 font-ui min-h-screen"
    style="pointer-events: auto"
  >
    <div class="epitaxy-root">
      <div class="dframe-root" style="--df-sidebar-width: 288px">
                  <aside
                    class="dframe-sidebar jv-sidebar"
                    data-variant="desktop"
                    aria-label="Sidebar"
                    data-i18n-aria="aria.sidebar"
                  >
                    <a href="#dframe-main" class="jv-skip" data-i18n="skip">Skip to content</a>
                    <div class="jv-sb-chrome">
                      <a href="index.html" class="jv-sb-brand" aria-label="Jarvis">JARVIS</a>
                      <div class="jv-sb-chrome-actions">
                        <button id="base-ui-_r_b8_" type="button" class="jv-sb-icobtn" aria-label="Collapse sidebar" data-i18n-aria="aria.sidebar.collapse"></button>
                        <button id="base-ui-_r_ba_" type="button" class="jv-sb-icobtn" aria-label="Search" data-i18n-aria="aria.search"></button>
                      </div>
                    </div>
                    <div class="dframe-sidebar-body jv-sb-body">
                      <button type="button" data-row="" class="jv-sb-row is-selected" aria-keyshortcuts="Control+Shift+O">
                        <span class="df-leading-slot jv-sb-ico"><span></span></span>
                        <span class="min-w-0 truncate jv-sb-label" data-i18n="nav.new">New session</span>
                        <kbd class="jv-sb-kbd" aria-hidden="true">Ctrl+⇧+O</kbd>
                      </button>
                      <button type="button" data-row="" class="jv-sb-row">
                        <span class="df-leading-slot jv-sb-ico"><span></span></span>
                        <span class="min-w-0 truncate jv-sb-label" data-i18n="nav.customize">Customize</span>
                      </button>
                      <div class="dframe-nav-scroll jv-sb-scroll"></div>
                    </div>
                    <div class="jv-sb-footer">
                      <button type="button" id="base-ui-_r_f5_" data-testid="user-menu-button" class="jv-sb-account" aria-haspopup="menu" aria-expanded="false" aria-label="Account"><span class="jv-sb-avatar" aria-hidden="true"></span><span class="jv-sb-account-name">Jarvis</span></button>
                    </div>
                  </aside>
                <main id="dframe-main" tabindex="-1" class="dframe-content jv-main">
                  <div class="dframe-content-inner jv-main-inner">
                    <div class="jv-chat">
                      <header class="epitaxy-composer-width jv-welcome-head">
                        <h1 class="text-title jv-welcome-title">Welcome back</h1>
                      </header>
                      <div class="jv-chat-body epitaxy-composer-width">
                        <div data-epitaxy-transcript-region="" tabindex="-1" class="jv-transcript-region">
                          <div class="overflow-y-auto jv-transcript-scroll"></div>
                        </div>
                      </div>
                      <div class="jv-composer-wrap epitaxy-composer-width">
                        <div class="epitaxy-prompt jv-inputbar">
                          <div contenteditable="true" enterkeyhint="enter" translate="no" tabindex="0" aria-label="Prompt" data-i18n-aria="aria.prompt" class="tiptap ProseMirror jv-input"><p data-placeholder="Ask Jarvis – type or use the microphone" class="is-empty is-editor-empty"><br class="ProseMirror-trailingBreak"/></p></div>
                          <button id="jv-send-btn" type="button" class="jv-send" disabled aria-label="Send" data-i18n-aria="aria.send"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 20V5M6 11l6-6 6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                        </div>
                        <div class="jv-toolbar">
                          <div class="jv-toolbar-left">
                            <button id="base-ui-_r_ka_" type="button" aria-haspopup="menu" aria-expanded="false" class="jv-tb-btn jv-tb-mode"><span>Auto</span></button>
                            <button id="base-ui-_r_ki_" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Add" data-i18n-aria="aria.add" class="jv-tb-btn jv-tb-icon"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                            <input id="chat-input-file-upload-epitaxy" type="file" multiple="" value="" style="display:none"/>
                            <div role="group" aria-label="Dictate" data-i18n-aria="aria.dictate" class="jv-mic-pill">
                              <button id="base-ui-_r_kq_" type="button" aria-pressed="false" aria-label="Press and hold to record" data-i18n-aria="aria.dictate_hold" class="jv-mic-btn"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 15.5a3.5 3.5 0 0 0 3.5-3.5V7a3.5 3.5 0 0 0-7 0v5a3.5 3.5 0 0 0 3.5 3.5Z" stroke="currentColor" stroke-width="1.5"/><path d="M18.5 12a6.5 6.5 0 0 1-13 0M12 18.5V22" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></button>
                              <button id="base-ui-_r_ks_" type="button" aria-haspopup="menu" aria-expanded="false" aria-label="Dictation settings" data-i18n-aria="aria.dictate_settings" class="jv-mic-set"><svg viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 9l6 6 6-6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
                            </div>
                          </div>
                          <div class="jv-toolbar-right">
                            <button id="base-ui-_r_l4_" type="button" aria-haspopup="menu" aria-expanded="false" class="jv-tb-btn jv-tb-model"><span>Modell</span></button>
                            <button id="base-ui-_r_la_" type="button" aria-haspopup="dialog" aria-expanded="false" data-base-ui-click-trigger="" class="jv-tb-btn jv-tb-effort"><span>Extra</span></button>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                </main>
      </div>
    </div>
    <script src="assets/js/hugeicons.js"></script>
    <script src="assets/js/i18n.js"></script>
    <script src="assets/js/app.js"></script>
  </body>
</html>
